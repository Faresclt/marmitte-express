<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cuisine — La Marmitte Express</title>
<meta name="theme-color" content="#e84040">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, onSnapshot, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChl-uEyzbbdJfhXwOUH_rpzSIsEAbexhQ",
  authDomain: "la-marmitte-express.firebaseapp.com",
  projectId: "la-marmitte-express",
  storageBucket: "la-marmitte-express.firebasestorage.app",
  messagingSenderId: "215969803476",
  appId: "1:215969803476:web:39ee4de2cf4475f3c2df41"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let orders = {};
let previousOrderCount = 0;
let soundEnabled = true;

// Listen to all orders in real-time
onSnapshot(collection(db, 'orders'), snap => {
  const newOrders = {};
  snap.forEach(d => newOrders[d.id] = {...d.data(), _id: d.id});
  
  // Check for new orders (to play sound)
  const activeStatuses = ['pending','received','preparing'];
  const newActive = Object.values(newOrders).filter(o => activeStatuses.includes(o.status));
  const oldActive = Object.values(orders).filter(o => activeStatuses.includes(o.status));
  
  if(newActive.length > oldActive.length && previousOrderCount > 0){
    playNotifSound();
    if(Notification.permission === 'granted'){
      new Notification('🔔 Nouvelle commande !', {body: 'Une commande vient d\'arriver en cuisine', icon: 'icon-192.png'});
    }
  }
  previousOrderCount = newActive.length;
  orders = newOrders;
  renderOrders();
  updateStats();
  document.getElementById('status-dot').classList.add('on');
  document.getElementById('status-text').textContent = 'Connecté';
});

// Update order status
async function setStatus(orderId, status){
  try{
    await updateDoc(doc(db, 'orders', orderId), {status, updatedAt: serverTimestamp()});
  }catch(e){ console.error(e); }
}

// Delete old completed orders
async function clearDone(orderId){
  try{
    await deleteDoc(doc(db, 'orders', orderId));
  }catch(e){ console.error(e); }
}

window.setStatus = setStatus;
window.clearDone = clearDone;

function renderOrders(){
  const all = Object.values(orders).sort((a,b) => {
    const t = x => x?.sentAt?.seconds || x?.sentAt?.toDate?.()?.getTime()/1000 || 0;
    return t(a) - t(b);
  });
  
  const received = all.filter(o => o.status === 'received' || o.status === 'pending');
  const preparing = all.filter(o => o.status === 'preparing');
  const ready = all.filter(o => o.status === 'ready');
  
  document.getElementById('col-new').innerHTML = received.length
    ? received.map(o => orderCard(o, 'new')).join('')
    : '<div class="empty-col">Aucune commande en attente</div>';
    
  document.getElementById('col-prep').innerHTML = preparing.length
    ? preparing.map(o => orderCard(o, 'prep')).join('')
    : '<div class="empty-col">Rien en préparation</div>';
    
  document.getElementById('col-ready').innerHTML = ready.length
    ? ready.map(o => orderCard(o, 'ready')).join('')
    : '<div class="empty-col">Rien de prêt</div>';
  
  // Update column badges
  document.getElementById('badge-new').textContent = received.length;
  document.getElementById('badge-prep').textContent = preparing.length;
  document.getElementById('badge-ready').textContent = ready.length;
  document.getElementById('badge-new').style.display = received.length ? 'flex' : 'none';
  document.getElementById('badge-prep').style.display = preparing.length ? 'flex' : 'none';
  document.getElementById('badge-ready').style.display = ready.length ? 'flex' : 'none';
}

function orderCard(o, type){
  const items = (o.items||[]);
  const tableLabel = o.tableNum ? 'Table '+o.tableNum : (o.tableId||'?');
  const time = o.sentAt?.toDate ? o.sentAt.toDate().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
  const source = o.source === 'client' ? '📱 Client' : '🍽️ Serveur';
  
  let actions = '';
  if(type === 'new'){
    actions = `<button class="ocard-btn prep-btn" onclick="setStatus('${o._id}','preparing')">🔥 En préparation</button>`;
  } else if(type === 'prep'){
    actions = `<button class="ocard-btn ready-btn" onclick="setStatus('${o._id}','ready')">✅ Prêt !</button>`;
  } else if(type === 'ready'){
    actions = `<button class="ocard-btn done-btn" onclick="setStatus('${o._id}','served')">🍽️ Servi</button>
               <button class="ocard-btn clear-btn" onclick="clearDone('${o._id}')">✕</button>`;
  }
  
  return `<div class="ocard ${type}" ${type==='new'?'style="animation:pulse 1.5s ease infinite"':''}>
    <div class="ocard-header">
      <div class="ocard-table">${tableLabel}</div>
      <div class="ocard-time">${time}</div>
      <div class="ocard-source">${source}</div>
    </div>
    <div class="ocard-items">
      ${items.map(i => {
        const opts = [i.cuisson, i.garniture].filter(Boolean).join(' · ');
        return `<div class="ocard-item">
          <span class="ocard-qty">${i.qty}×</span>
          <span class="ocard-name">${i.name}</span>
          ${opts ? `<span class="ocard-opts">${opts}</span>` : ''}
        </div>`;
      }).join('')}
    </div>
    ${o.note ? `<div class="ocard-note">📝 ${o.note}</div>` : ''}
    <div class="ocard-actions">${actions}</div>
  </div>`;
}

function updateStats(){
  const all = Object.values(orders);
  const active = all.filter(o => ['pending','received','preparing'].includes(o.status));
  document.getElementById('stat-active').textContent = active.length;
  const today = new Date().toDateString();
  const todayOrders = all.filter(o => {
    const d = o.sentAt?.toDate ? o.sentAt.toDate() : null;
    return d && d.toDateString() === today;
  });
  document.getElementById('stat-today').textContent = todayOrders.length;
}

function playNotifSound(){
  if(!soundEnabled) return;
  try{
    const ctx = new AudioContext();
    [0, 0.15, 0.3].forEach((delay,i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime([880,1100,1320][i], ctx.currentTime+delay);
      g.gain.setValueAtTime(0.25, ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.2);
      o.start(ctx.currentTime+delay);
      o.stop(ctx.currentTime+delay+0.2);
    });
  }catch(e){}
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  document.getElementById('sound-btn').textContent = soundEnabled ? '🔔' : '🔕';
}
window.toggleSound = toggleSound;

// Request notification permission
if('Notification' in window && Notification.permission === 'default'){
  Notification.requestPermission();
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0d10;--surface:#13141a;--card:#1a1c24;--border:rgba(255,255,255,.08);--text:#f0f0f0;--muted:#656878;--accent:#f5a623;--green:#22c97a;--red:#e84040;--blue:#4a9eff;--purple:#9b6bff;--radius:16px}
html,body{height:100%;height:100dvh;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* Header */
.header{height:56px;display:flex;align-items:center;padding:0 16px;gap:12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px}
.header-logo span{color:var(--red)}
.header-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(232,64,64,.12);color:var(--red);border:1px solid rgba(232,64,64,.2)}
.header-stats{margin-left:auto;display:flex;gap:16px;align-items:center}
.stat{text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sound-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.status-bar{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.status-dot.on{background:var(--green);box-shadow:0 0 8px rgba(34,201,122,.4)}
.home-btn{height:34px;padding:0 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px}
.home-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Columns */
.board{display:flex;flex:1;min-height:0;overflow:hidden}
.column{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
.column:last-child{border-right:none}
.col-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.col-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;flex:1}
.col-badge{min-width:22px;height:22px;padding:0 6px;border-radius:12px;font-size:11px;font-weight:800;display:none;align-items:center;justify-content:center}
.col-new .col-title{color:var(--red)}
.col-new .col-badge{background:rgba(232,64,64,.15);color:var(--red)}
.col-prep .col-title{color:var(--accent)}
.col-prep .col-badge{background:rgba(245,166,35,.15);color:var(--accent)}
.col-ready .col-title{color:var(--green)}
.col-ready .col-badge{background:rgba(34,201,122,.15);color:var(--green)}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.empty-col{padding:30px;text-align:center;color:var(--muted);font-size:13px}

/* Order cards */
.ocard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .15s}
.ocard.new{border-color:rgba(232,64,64,.4);box-shadow:0 4px 20px rgba(232,64,64,.1)}
.ocard.prep{border-color:rgba(245,166,35,.3);box-shadow:0 4px 20px rgba(245,166,35,.08)}
.ocard.ready{border-color:rgba(34,201,122,.3);box-shadow:0 4px 20px rgba(34,201,122,.08)}
.ocard-header{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.ocard-table{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);flex:1}
.ocard-time{font-size:11px;color:var(--muted);font-weight:600}
.ocard-source{font-size:10px;color:var(--muted)}
.ocard-items{padding:10px 14px}
.ocard-item{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.ocard-item:last-child{border-bottom:none}
.ocard-qty{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent);min-width:28px}
.ocard-name{font-size:14px;font-weight:600;flex:1}
.ocard-opts{font-size:11px;color:var(--accent);font-weight:600}
.ocard-note{padding:8px 14px;background:rgba(245,166,35,.06);border-top:1px solid rgba(245,166,35,.1);font-size:12px;color:var(--accent);font-weight:600}
.ocard-actions{padding:8px 14px;display:flex;gap:6px;border-top:1px solid var(--border)}
.ocard-btn{flex:1;height:40px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .1s}
.ocard-btn:active{transform:scale(.96)}
.prep-btn{background:rgba(245,166,35,.15);color:var(--accent);border:1px solid rgba(245,166,35,.25)}
.ready-btn{background:var(--green);color:#000}
.done-btn{background:rgba(74,158,255,.12);color:var(--blue);border:1px solid rgba(74,158,255,.2);flex:3}
.clear-btn{background:rgba(232,64,64,.1);color:var(--red);border:1px solid rgba(232,64,64,.15);flex:1;font-size:16px}

@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(232,64,64,.1)}50%{box-shadow:0 4px 30px rgba(232,64,64,.25)}}

/* Mobile */
@media(max-width:768px){
  .board{flex-direction:column}
  .column{border-right:none;border-bottom:1px solid var(--border);min-height:180px}
  .header{flex-wrap:wrap;height:auto;padding:10px 12px;gap:8px}
  .header-stats{gap:10px}
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="home-btn">← Accueil</a>
  <div class="header-logo">🔥 <span>Cuisine</span></div>
  <div class="header-badge">EN DIRECT</div>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text" style="color:var(--muted)">Connexion…</span>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-val" id="stat-active">0</div>
      <div class="stat-lbl">En cours</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-today">0</div>
      <div class="stat-lbl">Aujourd'hui</div>
    </div>
    <button class="sound-btn" id="sound-btn" onclick="toggleSound()" title="Activer/désactiver le son">🔔</button>
  </div>
</div>

<div class="board">
  <!-- Nouvelles commandes -->
  <div class="column col-new">
    <div class="col-header">
      <div class="col-title">🔴 Nouvelles</div>
      <div class="col-badge" id="badge-new">0</div>
    </div>
    <div class="col-body" id="col-new">
      <div class="empty-col">En attente de commandes…</div>
    </div>
  </div>

  <!-- En préparation -->
  <div class="column col-prep">
    <div class="col-header">
      <div class="col-title">🟠 En préparation</div>
      <div class="col-badge" id="badge-prep">0</div>
    </div>
    <div class="col-body" id="col-prep">
      <div class="empty-col">Rien en préparation</div>
    </div>
  </div>

  <!-- Prêts à servir -->
  <div class="column col-ready">
    <div class="col-header">
      <div class="col-title">🟢 Prêts</div>
      <div class="col-badge" id="badge-ready">0</div>
    </div>
    <div class="col-body" id="col-ready">
      <div class="empty-col">Rien de prêt</div>
    </div>
  </div>
</div>

</body>
</html>
