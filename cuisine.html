<!DOCTYPE html>
<html lang="fr">
<head>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebasestorage.app https://firestore.googleapis.com https://generativelanguage.googleapis.com https://cdnjs.cloudflare.com data: blob:; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cuisine — La Marmitte Express</title>
<meta name="theme-color" content="#e84040">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0e;
  --surface: #111318;
  --card: #181a22;
  --border: rgba(255,255,255,.07);
  --accent: #f5a623;
  --green: #22c97a;
  --red: #e84040;
  --blue: #4a9eff;
  --text: #f0f0f4;
  --muted: #8b8fa3;
  --radius: 14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#0a0b0e;color:#f0f0f4;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.hdr{display:flex;align-items:center;padding:8px 12px;gap:8px;background:#111318;border-bottom:2px solid rgba(255,255,255,.07);flex-shrink:0;flex-wrap:wrap}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.hdr-logo span{color:#e84040}
.hdr-live{font-size:8px;font-weight:800;padding:3px 8px;border-radius:20px;background:#e84040;color:#fff}
.hdr-st{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#5a5e72}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:#5a5e72}
.hdr-dot.on{background:#22c97a;box-shadow:0 0 8px rgba(34,201,122,.5)}
.hbtn{height:30px;padding:0 12px;border-radius:8px;background:#181a22;border:1px solid rgba(255,255,255,.07);color:#5a5e72;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.sum-btn{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.25);color:#f5a623}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.kpi{text-align:center}.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#f5a623}.kpi-l{font-size:7px;color:#5a5e72;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.snd-btn{width:34px;height:34px;border-radius:50%;background:#181a22;border:1px solid rgba(255,255,255,.07);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s}
.snd-btn.active{background:rgba(245,166,35,.15);border-color:rgba(245,166,35,.4)}
.voice-btn{width:34px;height:34px;border-radius:50%;background:#181a22;border:1px solid rgba(255,255,255,.07);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s}
.voice-btn.active{background:rgba(74,158,255,.15);border-color:rgba(74,158,255,.4)}

#sum{max-height:0;overflow:hidden;transition:max-height .3s;background:#111318;border-bottom:2px solid rgba(255,255,255,.07)}
#sum.open{max-height:220px;overflow-y:auto}
#sum-body{padding:12px;display:flex;flex-wrap:wrap;gap:6px}
.stag{display:inline-flex;align-items:center;gap:5px;background:#1e2130;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:6px 14px;font-size:14px;font-weight:700}
.stag-q{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#f5a623}

.board{display:flex;flex:1;min-height:0;overflow:hidden}
.col{flex:1;display:flex;flex-direction:column;min-width:0;border-right:2px solid rgba(255,255,255,.07)}
.col:last-child{border-right:none}
.col-hd{padding:10px 12px;display:flex;align-items:center;gap:6px;border-bottom:2px solid rgba(255,255,255,.07);flex-shrink:0;background:#111318}
.col-t{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;flex:1}
.c-new .col-t{color:#e84040}
.c-prep .col-t{color:#f5a623}
.c-ready .col-t{color:#22c97a}
.col-b{min-width:24px;height:24px;padding:0 6px;border-radius:12px;font-size:12px;font-weight:800;display:none;align-items:center;justify-content:center}
.c-new .col-b{background:rgba(232,64,64,.2);color:#e84040}
.c-prep .col-b{background:rgba(245,166,35,.2);color:#f5a623}
.c-ready .col-b{background:rgba(34,201,122,.2);color:#22c97a}

.col-scroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:8px}
.col-scroll .empty{padding:30px;text-align:center;color:#5a5e72;font-size:13px}

.tkt{background:#181a22;border:2px solid rgba(255,255,255,.07);border-radius:16px;margin-bottom:10px;overflow:hidden}
.tkt.new{border-color:rgba(232,64,64,.5)}
.tkt.prep{border-color:rgba(245,166,35,.4)}
.tkt.ready{border-color:rgba(34,201,122,.4)}
.tkt.late{border-color:#e84040 !important;animation:lateFlash 1s ease infinite}
@keyframes lateFlash{0%,100%{box-shadow:0 0 20px rgba(232,64,64,.3)}50%{box-shadow:0 0 30px rgba(232,64,64,.6)}}

.tkt-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02)}
.tkt-tbl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#f5a623}
.tkt-time{font-size:13px;color:#5a5e72;font-weight:700}
.tkt-ago{font-size:11px;color:#5a5e72;margin-top:2px;text-align:right}
.tkt-ago.late-txt{color:#e84040;font-weight:800}

.tkt-body{padding:12px 16px}
.tkt-row{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.tkt-row:last-child{border-bottom:none}
.tkt-qty{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#f5a623;min-width:40px}
.tkt-nm{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.tkt-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;padding-left:40px}
.tkt-tag{font-size:12px;font-weight:700;color:#000;background:#f5a623;padding:3px 10px;border-radius:20px}

.tkt-note{padding:12px 16px;background:rgba(232,64,64,.12);border-top:2px solid rgba(232,64,64,.3);font-size:14px;color:#e84040;font-weight:800;animation:noteFlash 1s ease infinite}
@keyframes noteFlash{0%,100%{background:rgba(232,64,64,.12)}50%{background:rgba(232,64,64,.25)}}

.tkt-act{padding:10px 12px;display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.05)}
.tbtn{height:52px;min-height:52px;flex:1;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;touch-action:manipulation}
.tbtn:active{transform:scale(.92);filter:brightness(1.3)}
.tbtn-prep{background:rgba(245,166,35,.15);color:#f5a623;border:2px solid rgba(245,166,35,.3)}
.tbtn-ready{background:#22c97a;color:#000;font-weight:800}
.tbtn-done{background:rgba(74,158,255,.12);color:#4a9eff;border:2px solid rgba(74,158,255,.2);flex:3}
.tbtn-clr{background:rgba(232,64,64,.1);color:#e84040;border:2px solid rgba(232,64,64,.15);flex:1;font-size:22px}

@keyframes unlockPulse{0%,100%{box-shadow:0 0 0 rgba(232,64,64,0)}50%{box-shadow:0 0 12px rgba(232,64,64,.4)}}
#audio-unlock.unlocked{background:rgba(34,201,122,.15) !important;border-color:rgba(34,201,122,.4) !important;color:#22c97a !important;animation:none !important;pointer-events:none}

@media(max-width:900px){
  .board{flex-direction:column}
  .col{border-right:none;border-bottom:2px solid rgba(255,255,255,.07);flex:1;min-height:0}
}
</style>
</head>
<body>

<div class="hdr">
  <a href="index.html" class="hbtn">← Accueil</a>
  <div class="hdr-logo">🔥 <span>CUISINE</span></div>
  <div class="hdr-live">EN DIRECT</div>
  <div class="hdr-st"><div class="hdr-dot" id="sdot"></div><span id="stxt">…</span></div>
  <button class="hbtn sum-btn" onclick="toggleSum()">📋 Résumé des plats</button>
  <div class="hdr-r">
    <div class="kpi"><div class="kpi-v" id="s-act">0</div><div class="kpi-l">En cours</div></div>
    <div class="kpi"><div class="kpi-v" id="s-tod">0</div><div class="kpi-l">Aujourd'hui</div></div>
    <button class="snd-btn active" id="snd" onclick="toggleSound()" title="Sonnerie nouvelle commande">🔔</button>
    <button class="voice-btn active" id="voiceBtn" onclick="toggleVoice()" title="Lecture vocale des plats">🔊</button>
    <button class="hbtn" id="audio-unlock" onclick="unlockAudio()" style="background:rgba(232,64,64,.15);border-color:rgba(232,64,64,.4);color:#e84040;font-weight:800;animation:unlockPulse 2s ease infinite">🔈 Activer le son</button>
  </div>
</div>

<div id="sum"><div id="sum-body"></div></div>

<div class="board">
  <div class="col c-new">
    <div class="col-hd"><div class="col-t">🔴 NOUVELLES</div><div class="col-b" id="bn">0</div></div>
    <div class="col-scroll" id="col-new"><div class="empty">En attente de commandes…</div></div>
  </div>
  <div class="col c-prep">
    <div class="col-hd"><div class="col-t">🟠 EN PRÉPARATION</div><div class="col-b" id="bp">0</div></div>
    <div class="col-scroll" id="col-prep"><div class="empty">Rien en préparation</div></div>
  </div>
  <div class="col c-ready">
    <div class="col-hd"><div class="col-t">🟢 PRÊTS</div><div class="col-b" id="br">0</div></div>
    <div class="col-scroll" id="col-ready"><div class="empty">Rien de prêt</div></div>
  </div>
</div>

<script type="module">
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyChl-uEyzbbdJfhXwOUH_rpzSIsEAbexhQ",
  authDomain:"la-marmitte-express.firebaseapp.com",
  projectId:"la-marmitte-express",
  storageBucket:"la-marmitte-express.firebasestorage.app",
  messagingSenderId:"215969803476",
  appId:"1:215969803476:web:39ee4de2cf4475f3c2df41"
}));

let orders = {};
let prevCount = 0;
let noCuisineCategories = [];
let noCuisineProductNames = new Set(); // Fallback: product names from noCuisine categories

// ── États persistants (localStorage) ──
let soundOn = localStorage.getItem('cuisineSoundOn') !== 'false';
let voiceOn = localStorage.getItem('cuisineVoiceOn') !== 'false';

function updateButtons() {
  const sndBtn = document.getElementById('snd');
  const voiceBtn = document.getElementById('voiceBtn');
  sndBtn.textContent = soundOn ? '🔔' : '🔕';
  sndBtn.classList.toggle('active', soundOn);
  voiceBtn.textContent = voiceOn ? '🔊' : '🔇';
  voiceBtn.classList.toggle('active', voiceOn);
}
updateButtons();

// ── Chargement menu (catégories noCuisine + noms produits boissons) ──
onSnapshot(doc(db, 'config', 'menu'), snap => {
  const data = snap.data();
  let allCats = [];
  if (data && data.categories) {
    allCats = data.categories;
  } else if (data && data.cats) {
    allCats = data.cats || [];
  }
  noCuisineCategories = allCats
    .filter(c => c.noCuisine === true)
    .map(c => c.id || c.name);
  // Build product name set for fallback matching (old orders without cat field)
  noCuisineProductNames.clear();
  if (data && data.products && noCuisineCategories.length) {
    data.products.forEach(p => {
      if (noCuisineCategories.includes(p.cat)) {
        noCuisineProductNames.add((p.name||'').toLowerCase().trim());
      }
    });
  }
  console.log('[Cuisine] noCuisine cats:', noCuisineCategories, 'products:', [...noCuisineProductNames]);
  // Re-render with updated filter
  if (Object.keys(orders).length > 0) renderAll();
});

// ── Écoute commandes ──
onSnapshot(collection(db, 'orders'), snap => {
  const nw = {};
  snap.forEach(d => nw[d.id] = { ...d.data(), _id: d.id });

  const actS = ['pending','received','preparing'];
  const nA = Object.values(nw).filter(o => actS.includes(o.status)).length;
  const oA = Object.values(orders).filter(o => actS.includes(o.status)).length;

  if (nA > oA && prevCount > 0) {
    const newOrders = Object.values(nw).filter(o =>
      actS.includes(o.status) && !orders[o._id]
    );
    if (soundOn) playSound();
    if (voiceOn && newOrders.length > 0) speakOrder(newOrders[0]);
    if (Notification.permission === 'granted')
      new Notification('Nouvelle commande !', {body:'Commande en cuisine', icon:'icon-192.png'});
  }
  prevCount = nA;
  orders = nw;
  renderAll();
  document.getElementById('sdot').classList.add('on');
  document.getElementById('stxt').textContent = 'Connecté';
});

window.doStatus = async function(id, s) {
  try { await updateDoc(doc(db, 'orders', id), { status: s, updatedAt: serverTimestamp() }); } catch(e) { console.error(e); }
};
window.doClear = async function(id) {
  try { await deleteDoc(doc(db, 'orders', id)); } catch(e) {}
};

function minsAgo(o) {
  if (!o.sentAt) return 0;
  const sent = o.sentAt.toDate ? o.sentAt.toDate() : new Date(o.sentAt.seconds * 1000);
  return Math.floor((Date.now() - sent.getTime()) / 60000);
}

// ── Filtre : exclure les items des catégories noCuisine ──
function filterCuisineItems(items) {
  if (!noCuisineCategories.length) return items;
  return items.filter(i => {
    // Primary: match by category ID
    const cat = i.catId || i.cat || i.category || '';
    if (cat && noCuisineCategories.includes(cat)) return false;
    // Fallback: match by product name (for old orders without cat field)
    if (!cat && noCuisineProductNames.size > 0) {
      const name = (i.name||'').toLowerCase().trim();
      if (noCuisineProductNames.has(name)) return false;
    }
    return true;
  });
}

function renderAll() {
  const all = Object.values(orders).sort((a,b) => (a?.sentAt?.seconds||0) - (b?.sentAt?.seconds||0));
  const received = all.filter(o => o.status === 'received' || o.status === 'pending');
  const preparing = all.filter(o => o.status === 'preparing');
  const ready = all.filter(o => o.status === 'ready');

  const receivedF = received.filter(o => filterCuisineItems(o.items||[]).length > 0);
  const preparingF = preparing.filter(o => filterCuisineItems(o.items||[]).length > 0);
  const readyF = ready.filter(o => filterCuisineItems(o.items||[]).length > 0);

  document.getElementById('col-new').innerHTML = receivedF.length
    ? receivedF.map(o => makeTicket(o, 'new')).join('')
    : '<div class="empty">✓ Pas de nouvelles commandes</div>';
  document.getElementById('col-prep').innerHTML = preparingF.length
    ? preparingF.map(o => makeTicket(o, 'prep')).join('')
    : '<div class="empty">Rien en préparation</div>';
  document.getElementById('col-ready').innerHTML = readyF.length
    ? readyF.map(o => makeTicket(o, 'ready')).join('')
    : '<div class="empty">Rien de prêt</div>';

  const bn = document.getElementById('bn'); bn.textContent = receivedF.length; bn.style.display = receivedF.length ? 'flex' : 'none';
  const bp = document.getElementById('bp'); bp.textContent = preparingF.length; bp.style.display = preparingF.length ? 'flex' : 'none';
  const br = document.getElementById('br'); br.textContent = readyF.length; br.style.display = readyF.length ? 'flex' : 'none';

  document.getElementById('s-act').textContent = received.length + preparing.length;
  const today = new Date().toDateString();
  document.getElementById('s-tod').textContent = all.filter(o => {
    const d = o.sentAt?.toDate ? o.sentAt.toDate() : null;
    return d && d.toDateString() === today;
  }).length;

  const activeItems = [...receivedF, ...preparingF].flatMap(o => filterCuisineItems(o.items||[]));
  const sum = {};
  activeItems.forEach(i => { if (!sum[i.name]) sum[i.name] = 0; sum[i.name] += i.qty; });
  const arr = Object.entries(sum).sort((a,b) => b[1] - a[1]);
  document.getElementById('sum-body').innerHTML = arr.length
    ? arr.map(([n,q]) => `<div class="stag"><span class="stag-q">${q}×</span>${n}</div>`).join('')
    : '<span style="color:#5a5e72">Aucune commande active</span>';
}

function makeTicket(o, type) {
  const items = filterCuisineItems(o.items || []);
  const tbl = o.tableNum || o.tableId || '?';
  const time = o.sentAt?.toDate ? o.sentAt.toDate().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
  const mins = minsAgo(o);
  const late = type === 'new' && mins >= 10;

  let btns = '';
  if (type === 'new') btns = `<button class="tbtn tbtn-prep" onclick="doStatus('${o._id}','preparing')">🔥 EN PRÉPARATION</button>`;
  else if (type === 'prep') btns = `<button class="tbtn tbtn-ready" onclick="doStatus('${o._id}','ready')">✅ PRÊT À SERVIR</button>`;
  else btns = `<button class="tbtn tbtn-done" onclick="doStatus('${o._id}','served')">🍽️ SERVI</button><button class="tbtn tbtn-clr" onclick="doClear('${o._id}')">✕</button>`;

  let itemsHTML = '';
  for (const i of items) {
    const opts = [i.cuisson, i.garniture].filter(Boolean);
    itemsHTML += `<div class="tkt-row"><span class="tkt-qty">${i.qty}×</span><span class="tkt-nm">${i.name.toUpperCase()}</span></div>`;
    if (opts.length) itemsHTML += `<div class="tkt-tags">${opts.map(x=>`<span class="tkt-tag">${x}</span>`).join('')}</div>`;
  }

  return `<div class="tkt ${type}${late?' late':''}">
    <div class="tkt-hd">
      <div class="tkt-tbl">TABLE ${tbl}</div>
      <div><div class="tkt-time">${time}</div>${mins>0?`<div class="tkt-ago${late?' late-txt':''}">${mins} min</div>`:''}</div>
    </div>
    <div class="tkt-body">${itemsHTML}</div>
    ${o.note?`<div class="tkt-note">⚠️ ${esc(o.note)}</div>`:''}
    <div class="tkt-act">${btns}</div>
  </div>`;
}

function playSound() {
  try {
    const c = new AudioContext();
    [0,.15,.3].forEach((d,i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.frequency.setValueAtTime([880,1100,1320][i], c.currentTime+d);
      g.gain.setValueAtTime(.3, c.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001, c.currentTime+d+.2);
      o.start(c.currentTime+d); o.stop(c.currentTime+d+.2);
    });
  } catch(e) {}
}

// ── Audio unlock system (contourne les restrictions navigateur) ──
let audioUnlocked = false;
let audioCtx = null;
let speechQueue = [];

window.unlockAudio = function() {
  const btn = document.getElementById('audio-unlock');
  // 1. Unlock AudioContext
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {}
  // 2. Unlock SpeechSynthesis with silent utterance
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const silentUtt = new SpeechSynthesisUtterance('');
    silentUtt.volume = 0;
    silentUtt.lang = 'fr-FR';
    window.speechSynthesis.speak(silentUtt);
    // Then speak confirmation
    setTimeout(() => {
      const confirm = new SpeechSynthesisUtterance('Audio activé. En attente de commandes.');
      confirm.lang = 'fr-FR';
      confirm.rate = 1;
      confirm.pitch = 1;
      confirm.volume = 1;
      window.speechSynthesis.speak(confirm);
    }, 200);
  }
  audioUnlocked = true;
  btn.textContent = '🔊 Son activé';
  btn.classList.add('unlocked');
  // Process any queued orders
  speechQueue.forEach(o => speakOrder(o));
  speechQueue = [];
};

function speakOrder(order) {
  if (!('speechSynthesis' in window)) return;
  if (!audioUnlocked) { speechQueue.push(order); return; }
  const items = filterCuisineItems(order.items || []);
  if (!items.length) return;
  const tbl = order.tableNum || order.tableId || '?';
  const liste = items.map(i => {
    let desc = `${i.qty} ${i.name}`;
    if (i.cuisson) desc += `, cuisson ${i.cuisson}`;
    if (i.garniture) desc += `, avec ${i.garniture}`;
    return desc;
  }).join('. ');
  const texte = `Nouvelle commande, table ${tbl}. ${liste}.`;
  // Cancel any ongoing speech
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(texte);
  utt.lang = 'fr-FR';
  utt.rate = 0.92;
  utt.pitch = 1.05;
  utt.volume = 1;
  // Workaround: Chrome sometimes pauses long utterances
  utt.onpause = () => window.speechSynthesis.resume();
  window.speechSynthesis.speak(utt);
}

window.toggleSound = function() {
  soundOn = !soundOn;
  localStorage.setItem('cuisineSoundOn', soundOn);
  updateButtons();
};
window.toggleVoice = function() {
  voiceOn = !voiceOn;
  localStorage.setItem('cuisineVoiceOn', voiceOn);
  updateButtons();
};
window.toggleSum = function() { document.getElementById('sum').classList.toggle('open'); };

if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
</script>
