<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍽️ Serveur — La Marmitte Express</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FC={apiKey:"AIzaSyChl-uEyzbbdJfhXwOUH_rpzSIsEAbexhQ",authDomain:"la-marmitte-express.firebaseapp.com",projectId:"la-marmitte-express",storageBucket:"la-marmitte-express.firebasestorage.app",messagingSenderId:"215969803476",appId:"1:215969803476:web:39ee4de2cf4475f3c2df41"};
const db=getFirestore(initializeApp(FC));
let menu=null,salleLayout=[],tStatuses={},cart=[],selTable=null;

onSnapshot(doc(db,'config','menu'),snap=>{
  if(snap.exists()){menu=snap.data();if(menu.salleLayout)salleLayout=menu.salleLayout;renderFloor();if(selTable)renderMenu();setStatus('ok');}
  else setStatus('no-menu');
});
onSnapshot(collection(db,'tables'),snap=>{tStatuses={};snap.forEach(d=>tStatuses[d.id]={...d.data(),_id:d.id});renderFloor();});

function setStatus(s){
  const el=document.getElementById('spill');
  if(s==='ok'){el.textContent='🟢 En ligne';el.style.color='#22c97a';el.style.background='rgba(34,201,122,.12)';}
  else if(s==='no-menu'){el.textContent='⚠️ Publiez la carte';el.style.color='#f5a623';el.style.background='rgba(245,166,35,.1)';}
  else{el.textContent='🔴 Hors ligne';el.style.color='#e84040';el.style.background='rgba(232,64,64,.1)';}
}

function renderFloor(){
  const canvas=document.getElementById('floor-canvas');if(!canvas)return;
  const tables=salleLayout.filter(e=>e.type==='table-round'||e.type==='table-rect');
  if(!tables.length){renderFallback();return;}
  const CW=canvas.clientWidth||window.innerWidth-20;
  const allEls=salleLayout;
  const maxX=Math.max(...allEls.map(e=>e.x+(e.w||(e.type==='table-rect'?(e.size||110)*1.4:(e.size||90)))))+20;
  const maxY=Math.max(...allEls.map(e=>e.y+(e.h||e.size||90)))+20;
  const scale=Math.min(CW/maxX, (window.innerHeight*0.55)/maxY);
  const CH=Math.ceil(maxY*scale);
  canvas.style.height=CH+'px';canvas.innerHTML='';
  allEls.forEach(el=>{
    const isT=el.type==='table-round'||el.type==='table-rect';
    const st=isT?(tStatuses[el.id]?.status||'free'):null;
    const occ=st==='occupied';
    const sel=selTable&&selTable.id===el.id;
    const div=document.createElement('div');
    div.style.cssText=`position:absolute;left:${el.x*scale}px;top:${el.y*scale}px;`;
    if(el.type==='table-round'){
      const sz=(el.size||90)*scale;
      div.style.cssText+=`width:${sz}px;height:${sz}px;border-radius:50%;background:${sel?'rgba(245,166,35,.3)':occ?'rgba(245,166,35,.1)':'rgba(34,201,122,.08)'};border:${sel?'2.5px solid #f5a623':occ?'2px solid rgba(245,166,35,.6)':'2px solid rgba(34,201,122,.45)'};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;box-shadow:${sel?'0 0 0 3px rgba(245,166,35,.3)':'none'};`;
      div.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:${Math.max(10,sz*.22)}px;color:${occ?'#f5a623':'#22c97a'};line-height:1">${el.number||''}</div><div style="font-size:${Math.max(7,sz*.11)}px;color:#6b7280">${el.seats||0}cvt</div>${occ?`<div style="font-size:${Math.max(7,sz*.1)}px;color:#f5a623;font-weight:800">${(tStatuses[el.id]?.total||0).toFixed(2).replace('.',',')}€</div>`:''}`;
    }else if(el.type==='table-rect'){
      const sz=(el.size||110)*scale;
      div.style.cssText+=`width:${sz*1.4}px;height:${sz}px;border-radius:${sz*.1}px;background:${sel?'rgba(245,166,35,.3)':occ?'rgba(245,166,35,.1)':'rgba(34,201,122,.08)'};border:${sel?'2.5px solid #f5a623':occ?'2px solid rgba(245,166,35,.6)':'2px solid rgba(34,201,122,.45)'};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;box-shadow:${sel?'0 0 0 3px rgba(245,166,35,.3)':'none'};`;
      div.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:${Math.max(10,sz*.2)}px;color:${occ?'#f5a623':'#22c97a'};line-height:1">${el.number||''}</div><div style="font-size:${Math.max(7,sz*.1)}px;color:#6b7280">${el.seats||0}cvt</div>${occ?`<div style="font-size:${Math.max(7,sz*.1)}px;color:#f5a623;font-weight:800">${(tStatuses[el.id]?.total||0).toFixed(2).replace('.',',')}€</div>`:''}`;
    }else if(el.type==='bar'){
      const w=(el.w||160)*scale,h=(el.h||55)*scale;
      div.style.cssText+=`width:${w}px;height:${h}px;border-radius:${h*.15}px;background:rgba(74,158,255,.07);border:1px solid rgba(74,158,255,.25);display:flex;align-items:center;justify-content:center;gap:4px;`;
      div.innerHTML=`<span style="font-size:${Math.max(10,h*.38)}px">🍺</span><span style="font-family:'Bebas Neue',sans-serif;font-size:${Math.max(9,h*.3)}px;color:#4a9eff">${el.number||'BAR'}</span>`;
    }else if(el.type==='wall'){
      div.style.cssText+=`width:${(el.w||12)*scale}px;height:${(el.h||100)*scale}px;border-radius:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);`;
    }else if(el.type==='plant'){
      const sz=(el.size||44)*scale;
      div.style.cssText+=`width:${sz}px;height:${sz}px;border-radius:50%;background:rgba(34,201,122,.07);display:flex;align-items:center;justify-content:center;font-size:${sz*.55}px;`;
      div.textContent='🌿';
    }
    if(isT){
      div.style.cursor='pointer';
      div.addEventListener('click',()=>openOrder(el.id,el.number||el.id));
      div.addEventListener('touchend',e=>{e.preventDefault();openOrder(el.id,el.number||el.id);});
    }
    canvas.appendChild(div);
  });
}

function renderFallback(){
  const c=document.getElementById('floor-canvas');c.style.height='auto';c.innerHTML='';
  const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px';
  for(let n=1;n<=8;n++){
    const found=Object.values(tStatuses).find(t=>parseInt(t.number)===n);
    const occ=found?.status==='occupied';
    const b=document.createElement('button');
    b.className='ftbl';
    b.innerHTML=`<div class="ftn">${n}</div><div class="fts ${occ?'occ':'free'}">${occ?'Occupée':'Libre'}</div>${occ?`<div style="font-size:11px;font-weight:800;color:#f5a623">${(found?.total||0).toFixed(2)}€</div>`:''}`;
    b.onclick=()=>openOrder('t'+n,String(n));
    g.appendChild(b);
  }
  c.appendChild(g);
}

function openOrder(id,number){
  selTable={id,number};cart=[];
  document.getElementById('step-plan').style.display='none';
  document.getElementById('step-order').style.display='flex';
  document.getElementById('oname').textContent='Table '+number;
  renderMenu();renderCart();
}
function backToPlan(){
  selTable=null;cart=[];
  document.getElementById('step-order').style.display='none';
  document.getElementById('step-plan').style.display='flex';
  renderFloor();
}

function renderMenu(){
  if(!menu||!selTable)return;
  const tabs=document.getElementById('otabs'),content=document.getElementById('oprods');
  const cats=menu.cats||[];
  if(!cats.length){content.innerHTML='<div class="emsg">Carte vide — publiez depuis la caisse</div>';return;}
  let act=tabs.dataset.active||cats[0]?.id;
  if(!cats.find(c=>c.id===act))act=cats[0].id;
  tabs.innerHTML=cats.map(c=>`<button class="otab${act===c.id?' act':''}" onclick="switchTab('${c.id}')">${c.icon||''} ${c.name}</button>`).join('');
  tabs.dataset.active=act;
  const prods=(menu.products||[]).filter(p=>p.cat===act);
  const secs=[];prods.forEach(p=>{const s=p.section||'';let x=secs.find(q=>q.n===s);if(!x){x={n:s,i:[]};secs.push(x);}x.i.push(p);});
  let html='';secs.forEach(sec=>{
    if(sec.n)html+=`<div class="shdr">${sec.n.toUpperCase()}</div>`;
    sec.i.forEach(p=>{
      const q=cart.filter(r=>r.pid===p.id).reduce((s,r)=>s+r.qty,0);
      html+=`<div class="prow" onclick="addItem('${p.id}',${p.price},'${esc(p.name)}')">
        <div class="pi"><div class="pn">${p.pdj?'⭐ ':''}${p.name}</div>${p.sub?`<div class="ps">${p.sub}</div>`:''}</div>
        <div class="pr"><span class="pp">${p.price.toFixed(2).replace('.',',')}€</span>${q?`<div class="pb">${q}</div>`:'<div class="pa">+</div>'}</div>
      </div>`;
    });
  });
  content.innerHTML=html||'<div class="emsg">Aucun article</div>';
}
function switchTab(id){document.getElementById('otabs').dataset.active=id;renderMenu();}
function addItem(pid,price,name){
  const ex=cart.find(r=>r.pid===pid);if(ex)ex.qty++;else cart.push({pid,name,price:parseFloat(price),qty:1});
  renderCart();renderMenu();
  const fab=document.getElementById('cfab');fab.classList.remove('bonce');void fab.offsetWidth;fab.classList.add('bonce');
}
function rmItem(pid){
  const ex=cart.find(r=>r.pid===pid);if(!ex)return;
  if(ex.qty>1)ex.qty--;else cart=cart.filter(r=>r.pid!==pid);
  renderCart();renderMenu();
}
function renderCart(){
  const count=cart.reduce((s,r)=>s+r.qty,0),total=cart.reduce((s,r)=>s+r.qty*r.price,0);
  const fab=document.getElementById('cfab');
  fab.style.display=count?'flex':'none';
  document.getElementById('cbadge').textContent=count||'';
  document.getElementById('cfabtotal').textContent=total.toFixed(2).replace('.',',')+'€';
  document.getElementById('dsbtn').disabled=!count;
  document.getElementById('dcgt').textContent=total.toFixed(2).replace('.',',')+'€';
  document.getElementById('dcitems').innerHTML=!count
    ?'<div style="padding:24px;text-align:center;color:#6b7280;font-size:13px">🛒 Panier vide</div>'
    :cart.map(r=>`<div class="dcrow">
        <div class="dcri"><div class="dcrn">${r.name}</div><div class="dcrp">${r.price.toFixed(2).replace('.',',')}€/u</div></div>
        <div class="dcrq">
          <button onclick="rmItem('${r.pid}')">−</button>
          <span>${r.qty}</span>
          <button onclick="addItem('${r.pid}',${r.price},'${esc(r.name)}')">+</button>
        </div>
        <div class="dcrt">${(r.qty*r.price).toFixed(2).replace('.',',')}€</div>
      </div>`).join('');
}
function openDrawer(){document.getElementById('cdrawer').style.display='flex';}
function closeDrawer(){document.getElementById('cdrawer').style.display='none';}
async function sendOrder(){
  if(!cart.length||!selTable)return;
  const btn=document.getElementById('dsbtn');btn.disabled=true;btn.textContent='Envoi...';
  try{
    await addDoc(collection(db,'orders'),{tableId:selTable.id,tableNum:selTable.number,
      items:cart.map(r=>({pid:r.pid,name:r.name,price:r.price,qty:r.qty})),
      note:document.getElementById('dnote')?.value||'',status:'pending',source:'waiter',sentAt:serverTimestamp()});
    cart=[];renderCart();renderMenu();closeDrawer();
    document.getElementById('dnote').value='';
    const t=document.getElementById('sttoast');t.style.display='flex';
    t.querySelector('.stn').textContent='Table '+selTable.number;
    setTimeout(()=>t.style.display='none',2500);
    btn.disabled=false;btn.textContent='🚀 Envoyer';
  }catch(e){btn.disabled=false;btn.textContent='🚀 Envoyer';alert('Erreur: '+e.message);}
}
function esc(s){return String(s||'').replace(/'/g,"\\'")}
window.backToPlan=backToPlan;window.switchTab=switchTab;window.addItem=addItem;window.rmItem=rmItem;
window.sendOrder=sendOrder;window.openDrawer=openDrawer;window.closeDrawer=closeDrawer;
setTimeout(()=>{if(!menu)setStatus('error');},7000);
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0d10;--sf:#13141a;--card:#1a1c24;--bd:rgba(255,255,255,.08);--tx:#f0f0f0;--mu:#6b7280;--gn:#22c97a;--ac:#f5a623;--rd:#e84040;--bl:#4a9eff}
html{height:100%;height:100dvh}
body{height:100%;height:100dvh;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.step{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* Header */
#hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:54px}
.hl{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px}.hl span{color:var(--ac)}
.hs{font-size:9px;color:var(--mu);font-weight:700;letter-spacing:.5px}
#spill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:auto;white-space:nowrap;flex-shrink:0}

/* Floor */
#step-plan{flex-direction:column}
.stitle{padding:8px 14px 4px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--mu);flex-shrink:0}
#floor-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:10px;min-height:0}
#floor-canvas{position:relative;width:100%;min-height:80px}
#flegend{display:flex;gap:14px;padding:6px 14px 8px;flex-shrink:0;flex-wrap:wrap}
.fli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);font-weight:600}
.fld{width:9px;height:9px;border-radius:50%}
/* Fallback grid */
.ftbl{background:var(--card);border:2px solid var(--bd);border-radius:12px;padding:14px 6px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;width:100%}
.ftbl:active{border-color:var(--ac);background:rgba(245,166,35,.1)}
.ftn{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ac)}
.fts{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.fts.free{background:rgba(34,201,122,.12);color:var(--gn)}
.fts.occ{background:rgba(245,166,35,.12);color:var(--ac)}

/* Order step */
#step-order{flex-direction:column;display:none}
#ohdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.bbtn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--bd);color:var(--mu);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:sans-serif}
#oname{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--ac)}

/* Tabs */
#otabs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd);scrollbar-width:none;-webkit-overflow-scrolling:touch}
#otabs::-webkit-scrollbar{display:none}
.otab{height:32px;padding:0 12px;border-radius:20px;background:var(--card);border:1px solid var(--bd);color:var(--mu);font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.otab.act{background:rgba(245,166,35,.15);border-color:var(--ac);color:var(--ac)}

/* Products — KEY: flex:1 + overflow-y:auto + min-height:0 */
#oprods{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:90px;min-height:0}
.shdr{padding:6px 14px;font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--mu);background:rgba(255,255,255,.02);border-top:1px solid var(--bd);position:sticky;top:0;z-index:1}
.prow{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;min-height:58px}
.prow:active{background:var(--card)}
.pi{flex:1;min-width:0}.pn{font-size:14px;font-weight:600;line-height:1.3}
.ps{font-size:11px;color:var(--mu);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.pp{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gn)}
.pa{width:28px;height:28px;border-radius:50%;background:rgba(245,166,35,.15);color:var(--ac);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center}
.pb{width:28px;height:28px;border-radius:50%;background:var(--ac);color:#000;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
.emsg{padding:30px;text-align:center;color:var(--mu);font-size:13px}

/* FAB cart button */
#cfab{position:fixed;bottom:20px;right:16px;height:52px;padding:0 18px;border-radius:26px;background:var(--ac);color:#000;border:none;cursor:pointer;display:none;align-items:center;gap:8px;z-index:40;box-shadow:0 4px 20px rgba(245,166,35,.45);font-weight:700;font-size:13px}
#cbadge{background:#e84040;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#cfabtotal{font-family:'Bebas Neue',sans-serif;font-size:18px}
@keyframes bonce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.bonce{animation:bonce .25s ease}

/* Drawer */
#cdrawer{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:flex-end;justify-content:center}
.cdinner{background:var(--sf);border-radius:22px 22px 0 0;width:100%;max-height:88dvh;display:flex;flex-direction:column}
.cdhandle{width:40px;height:4px;border-radius:2px;background:var(--bd);margin:12px auto 4px;flex-shrink:0}
.cdhead{padding:10px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-shrink:0}
.cdhead h3{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px}
.cdbtn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--bd);color:var(--mu);font-size:16px;cursor:pointer}
#dcitems{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px;min-height:0}
.dcrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.dcri{flex:1;min-width:0}.dcrn{font-size:14px;font-weight:600}.dcrp{font-size:11px;color:var(--mu)}
.dcrq{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dcrq button{width:30px;height:30px;border-radius:50%;border:none;font-size:16px;cursor:pointer;font-weight:700}
.dcrq button:first-child{background:rgba(232,64,64,.12);color:var(--rd)}
.dcrq button:last-child{background:rgba(34,201,122,.12);color:var(--gn)}
.dcrq span{font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:22px;text-align:center}
.dcrt{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gn);min-width:58px;text-align:right;flex-shrink:0}
#cdfoot{padding:14px 16px;border-top:1px solid var(--bd);flex-shrink:0}
#dnote{width:100%;height:46px;background:var(--card);border:1.5px solid var(--bd);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--tx);resize:none;font-family:'DM Sans',sans-serif;margin-bottom:10px}
#dnote:focus{border-color:var(--ac);outline:none}
.dtr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.dtl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
#dcgt{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gn)}
#dsbtn{width:100%;height:52px;border-radius:14px;background:var(--ac);color:#000;font-size:16px;font-weight:800;cursor:pointer;border:none;transition:opacity .15s}
#dsbtn:disabled{opacity:.4;cursor:not-allowed}

/* Toast */
#sttoast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(34,201,122,.14);border:1px solid rgba(34,201,122,.3);border-radius:14px;padding:12px 20px;display:none;align-items:center;gap:10px;z-index:300;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.stm{font-size:12px;font-weight:700;color:var(--gn)}.stn{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gn)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div style="width:34px;height:34px;background:linear-gradient(135deg,#f5a623,#e8941a);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">🍽️</div>
    <div><div class="hl">La <span>Marmitte</span> Express</div><div class="hs">INTERFACE SERVEUR</div></div>
    <div id="spill">⏳...</div>
  </div>

  <!-- Plan de salle -->
  <div class="step" id="step-plan">
    <div class="stitle">🗺️ PLAN DE SALLE — APPUYEZ SUR UNE TABLE</div>
    <div id="floor-wrap"><div id="floor-canvas"></div></div>
    <div id="flegend">
      <div class="fli"><div class="fld" style="background:rgba(34,201,122,.7)"></div>Libre</div>
      <div class="fli"><div class="fld" style="background:rgba(245,166,35,.8)"></div>En cours</div>
    </div>
  </div>

  <!-- Prise de commande -->
  <div class="step" id="step-order">
    <div id="ohdr">
      <button class="bbtn" onclick="backToPlan()">←</button>
      <span id="oname">Table —</span>
      <span style="font-size:11px;color:var(--mu);margin-left:4px">· Commande</span>
    </div>
    <div id="otabs"></div>
    <div id="oprods"></div>
  </div>
</div>

<!-- FAB -->
<button id="cfab" onclick="openDrawer()">
  <div id="cbadge"></div>
  🛒 <span id="cfabtotal">0€</span>
</button>

<!-- Drawer panier -->
<div id="cdrawer" onclick="if(event.target===this)closeDrawer()">
  <div class="cdinner">
    <div class="cdhandle"></div>
    <div class="cdhead">
      <h3>🛒 Commande</h3>
      <button class="cdbtn" onclick="closeDrawer()">✕</button>
    </div>
    <div id="dcitems"></div>
    <div id="cdfoot">
      <textarea id="dnote" placeholder="Note cuisine (allergies, cuisson…)"></textarea>
      <div class="dtr"><div class="dtl">Total</div><div id="dcgt">0,00€</div></div>
      <button id="dsbtn" onclick="sendOrder()" disabled>🚀 Envoyer la commande</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="sttoast">
  <div style="font-size:20px">✅</div>
  <div><div class="stm">Commande envoyée</div><div class="stn">—</div></div>
</div>
</body>
</html>
