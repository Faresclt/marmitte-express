<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cuisine — La Marmitte Express</title>
<meta name="theme-color" content="#e84040">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, onSnapshot, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyChl-uEyzbbdJfhXwOUH_rpzSIsEAbexhQ",authDomain:"la-marmitte-express.firebaseapp.com",projectId:"la-marmitte-express",storageBucket:"la-marmitte-express.firebasestorage.app",messagingSenderId:"215969803476",appId:"1:215969803476:web:39ee4de2cf4475f3c2df41"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let orders={};
let prevCount=0;
let soundOn=true;

onSnapshot(collection(db,'orders'), snap=>{
  const nw={};
  snap.forEach(d=>nw[d.id]={...d.data(),_id:d.id});
  const act=['pending','received','preparing'];
  const nA=Object.values(nw).filter(o=>act.includes(o.status)).length;
  const oA=Object.values(orders).filter(o=>act.includes(o.status)).length;
  if(nA>oA&&prevCount>0){
    playSound();
    if(Notification.permission==='granted') new Notification('🔔 Nouvelle commande !',{body:'Commande en cuisine',icon:'icon-192.png'});
  }
  prevCount=nA;
  orders=nw;
  render();
  stats();
  document.getElementById('sdot').classList.add('on');
  document.getElementById('stxt').textContent='Connecté';
});

async function setStatus(id,s){
  const btn=event?.target;
  if(btn){btn.style.transform='scale(.9)';btn.style.opacity='.5';setTimeout(()=>{btn.style.transform='';btn.style.opacity='';},300);}
  try{await updateDoc(doc(db,'orders',id),{status:s,updatedAt:serverTimestamp()});}catch(e){console.error(e);}
}
async function clearDone(id){try{await deleteDoc(doc(db,'orders',id));}catch(e){}}
window.setStatus=setStatus;window.clearDone=clearDone;

function getMinutesAgo(o){
  if(!o.sentAt) return 0;
  const sent=o.sentAt.toDate?o.sentAt.toDate():new Date(o.sentAt.seconds*1000);
  return Math.floor((Date.now()-sent.getTime())/60000);
}

function render(){
  const all=Object.values(orders).sort((a,b)=>(a?.sentAt?.seconds||0)-(b?.sentAt?.seconds||0));
  const received=all.filter(o=>o.status==='received'||o.status==='pending');
  const preparing=all.filter(o=>o.status==='preparing');
  const ready=all.filter(o=>o.status==='ready');

  document.getElementById('col-new').innerHTML=received.length?received.map(o=>ticket(o,'new')).join(''):'<div class="empty">✓ Pas de nouvelles commandes</div>';
  document.getElementById('col-prep').innerHTML=preparing.length?preparing.map(o=>ticket(o,'prep')).join(''):'<div class="empty">Rien en préparation</div>';
  document.getElementById('col-ready').innerHTML=ready.length?ready.map(o=>ticket(o,'ready')).join(''):'<div class="empty">Rien de prêt</div>';

  document.getElementById('bn').textContent=received.length;document.getElementById('bn').style.display=received.length?'flex':'none';
  document.getElementById('bp').textContent=preparing.length;document.getElementById('bp').style.display=preparing.length?'flex':'none';
  document.getElementById('br').textContent=ready.length;document.getElementById('br').style.display=ready.length?'flex':'none';

  // Summary
  const activeItems=[...received,...preparing].flatMap(o=>o.items||[]);
  const sum={};
  activeItems.forEach(i=>{if(!sum[i.name])sum[i.name]=0;sum[i.name]+=i.qty;});
  const arr=Object.entries(sum).sort((a,b)=>b[1]-a[1]);
  document.getElementById('sum-body').innerHTML=arr.length
    ?arr.map(([n,q])=>`<div class="stag"><span class="stag-q">${q}×</span>${n}</div>`).join('')
    :'<span style="color:var(--muted)">Aucune commande active</span>';
}

function ticket(o,type){
  const items=o.items||[];
  const tbl=o.tableNum?o.tableNum:(o.tableId||'?');
  const time=o.sentAt?.toDate?o.sentAt.toDate().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'';
  const mins=getMinutesAgo(o);
  const late=type==='new'&&mins>=10;
  let acts='';
  if(type==='new') acts=`<button class="tbtn tbtn-prep" onclick="setStatus('${o._id}','preparing')">🔥 EN PRÉPARATION</button>`;
  else if(type==='prep') acts=`<button class="tbtn tbtn-ready" onclick="setStatus('${o._id}','ready')">✅ PRÊT À SERVIR</button>`;
  else acts=`<button class="tbtn tbtn-done" onclick="setStatus('${o._id}','served')">🍽️ SERVI</button><button class="tbtn tbtn-clr" onclick="clearDone('${o._id}')">✕</button>`;

  return `<div class="tkt ${type}${late?' late':''}">
    <div class="tkt-hd">
      <div class="tkt-tbl">TABLE ${tbl}</div>
      <div class="tkt-meta">
        <div class="tkt-time">${time}</div>
        ${mins>0?`<div class="tkt-ago ${late?'tkt-ago-late':''}">${mins} min</div>`:''}
      </div>
    </div>
    <div class="tkt-items">${items.map(i=>{
      const opts=[i.cuisson,i.garniture].filter(Boolean);
      return `<div class="tkt-row">
        <span class="tkt-qty">${i.qty}×</span>
        <span class="tkt-name">${i.name.toUpperCase()}</span>
        ${opts.length?`<div class="tkt-opts">${opts.map(x=>`<span class="tkt-tag">${x}</span>`).join('')}</div>`:''}
      </div>`;
    }).join('')}</div>
    ${o.note?`<div class="tkt-note"><span class="note-icon">⚠️</span> ${o.note}</div>`:''}
    <div class="tkt-actions">${acts}</div>
  </div>`;
}

function stats(){
  const all=Object.values(orders);
  document.getElementById('s-act').textContent=all.filter(o=>['pending','received','preparing'].includes(o.status)).length;
  const today=new Date().toDateString();
  document.getElementById('s-tod').textContent=all.filter(o=>{const d=o.sentAt?.toDate?o.sentAt.toDate():null;return d&&d.toDateString()===today;}).length;
}

function playSound(){
  if(!soundOn)return;
  try{const c=new AudioContext();[0,.15,.3].forEach((d,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime([880,1100,1320][i],c.currentTime+d);g.gain.setValueAtTime(.3,c.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d+.2);o.start(c.currentTime+d);o.stop(c.currentTime+d+.2);});}catch(e){}
}
function toggleSound(){soundOn=!soundOn;document.getElementById('snd').textContent=soundOn?'🔔':'🔕';}
window.toggleSound=toggleSound;
function toggleSum(){document.getElementById('sum').classList.toggle('open');}
window.toggleSum=toggleSum;
if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0b0e;--surface:#111318;--card:#181a22;--card2:#1e2130;--border:rgba(255,255,255,.07);--text:#f0f0f4;--muted:#5a5e72;--accent:#f5a623;--green:#22c97a;--red:#e84040;--blue:#4a9eff;--radius:16px}
html,body{height:100%;height:100dvh;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column}

/* ══ HEADER ══ */
.hdr{display:flex;align-items:center;padding:8px 12px;gap:8px;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}.hdr-logo span{color:var(--red)}
.hdr-live{font-size:8px;font-weight:800;padding:3px 8px;border-radius:20px;background:var(--red);color:#fff;animation:livePulse 1.5s ease infinite}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}
.st{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--muted)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--muted)}.sdot.on{background:var(--green);box-shadow:0 0 8px rgba(34,201,122,.5)}
.hbtn{height:30px;padding:0 12px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;transition:all .15s}
.hbtn:active{transform:scale(.95)}
.sum-btn{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.25);color:var(--accent)}
.hdr-r{margin-left:auto;display:flex;gap:12px;align-items:center}
.kpi{text-align:center;line-height:1}
.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)}
.kpi-l{font-size:7px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.snd{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.snd:active{transform:scale(.9)}

/* ══ SUMMARY ══ */
#sum{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--surface);border-bottom:2px solid var(--border)}
#sum.open{max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sum-body{padding:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.stag{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:6px 14px;font-size:14px;font-weight:700}
.stag-q{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);line-height:1}

/* ══ BOARD ══ */
.board{display:flex;flex:1;min-height:0;overflow:hidden}
.col{flex:1;display:flex;flex-direction:column;min-width:0;border-right:2px solid var(--border)}.col:last-child{border-right:none}
.col-hd{padding:10px 12px;display:flex;align-items:center;gap:6px;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--surface)}
.col-t{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;flex:1}
.col-b{min-width:24px;height:24px;padding:0 6px;border-radius:12px;font-size:12px;font-weight:800;display:none;align-items:center;justify-content:center}
.c-new .col-t{color:var(--red)}.c-new .col-b{background:rgba(232,64,64,.2);color:var(--red)}
.c-prep .col-t{color:var(--accent)}.c-prep .col-b{background:rgba(245,166,35,.2);color:var(--accent)}
.c-ready .col-t{color:var(--green)}.c-ready .col-b{background:rgba(34,201,122,.2);color:var(--green)}

/* ══ SCROLLABLE GRID ══ */
.col-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;align-content:start;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent}
.col-grid::-webkit-scrollbar{width:6px}.col-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.empty{grid-column:1/-1;padding:30px;text-align:center;color:var(--muted);font-size:13px}

/* ══ TICKET CARD ══ */
.tkt{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;display:flex;flex-direction:column}
.tkt.new{border-color:rgba(232,64,64,.5);box-shadow:0 4px 20px rgba(232,64,64,.1)}
.tkt.prep{border-color:rgba(245,166,35,.4);box-shadow:0 4px 20px rgba(245,166,35,.08)}
.tkt.ready{border-color:rgba(34,201,122,.4);box-shadow:0 4px 20px rgba(34,201,122,.08)}
.tkt.late{border-color:var(--red)!important;box-shadow:0 4px 30px rgba(232,64,64,.3)!important;animation:lateFlash 1s ease infinite}
@keyframes lateFlash{0%,100%{border-color:var(--red)}50%{border-color:rgba(232,64,64,.3)}}

.tkt-hd{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);background:rgba(255,255,255,.02)}
.tkt-tbl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1}
.tkt-meta{text-align:right}
.tkt-time{font-size:13px;color:var(--muted);font-weight:700}
.tkt-ago{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.tkt-ago-late{color:var(--red);font-weight:800}

.tkt-items{padding:10px 14px;flex:1}
.tkt-row{display:flex;align-items:baseline;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap}
.tkt-row:last-child{border:none}
.tkt-qty{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);min-width:36px;line-height:1}
.tkt-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.1}
.tkt-opts{display:flex;gap:4px;flex-wrap:wrap;width:100%;padding-left:36px;margin-top:2px}
.tkt-tag{font-size:12px;font-weight:700;color:#000;background:var(--accent);padding:2px 10px;border-radius:20px;white-space:nowrap}

.tkt-note{padding:10px 14px;background:rgba(232,64,64,.1);border-top:1.5px solid rgba(232,64,64,.2);font-size:14px;color:var(--red);font-weight:800;animation:noteFlash 1.2s ease infinite;display:flex;align-items:center;gap:6px}
@keyframes noteFlash{0%,100%{background:rgba(232,64,64,.1)}50%{background:rgba(232,64,64,.2)}}
.note-icon{font-size:18px}

.tkt-actions{padding:8px 10px;display:flex;gap:6px;border-top:1.5px solid var(--border)}
.tbtn{flex:1;height:48px;min-height:48px;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;cursor:pointer;border:none;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:6px;user-select:none;-webkit-user-select:none}
.tbtn:active{transform:scale(.93);filter:brightness(1.2)}
.tbtn-prep{background:rgba(245,166,35,.15);color:var(--accent);border:2px solid rgba(245,166,35,.3)}
.tbtn-ready{background:var(--green);color:#000;font-weight:800}
.tbtn-done{background:rgba(74,158,255,.12);color:var(--blue);border:2px solid rgba(74,158,255,.2);flex:3}
.tbtn-clr{background:rgba(232,64,64,.1);color:var(--red);border:2px solid rgba(232,64,64,.15);flex:1;font-size:20px}

/* ══ MOBILE ══ */
@media(max-width:900px){
  .board{flex-direction:column}
  .col{border-right:none;border-bottom:2px solid var(--border);flex:1;min-height:0}
  .col-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .hdr{padding:6px 8px;gap:5px}
  .tkt-tbl{font-size:22px}
  .tkt-qty{font-size:20px}
  .tkt-name{font-size:17px}
}
</style>
</head>
<body>

<div class="hdr">
  <a href="index.html" class="hbtn">← Accueil</a>
  <div class="hdr-logo">🔥 <span>CUISINE</span></div>
  <div class="hdr-live">EN DIRECT</div>
  <div class="st"><div class="sdot" id="sdot"></div><span id="stxt">…</span></div>
  <button class="hbtn sum-btn" onclick="toggleSum()">📋 Résumé des plats</button>
  <div class="hdr-r">
    <div class="kpi"><div class="kpi-v" id="s-act">0</div><div class="kpi-l">En cours</div></div>
    <div class="kpi"><div class="kpi-v" id="s-tod">0</div><div class="kpi-l">Aujourd'hui</div></div>
    <button class="snd" id="snd" onclick="toggleSound()">🔔</button>
  </div>
</div>

<div id="sum"><div id="sum-body"></div></div>

<div class="board">
  <div class="col c-new">
    <div class="col-hd"><div class="col-t">🔴 NOUVELLES</div><div class="col-b" id="bn">0</div></div>
    <div class="col-grid" id="col-new"><div class="empty">En attente de commandes…</div></div>
  </div>
  <div class="col c-prep">
    <div class="col-hd"><div class="col-t">🟠 EN PRÉPARATION</div><div class="col-b" id="bp">0</div></div>
    <div class="col-grid" id="col-prep"><div class="empty">Rien en préparation</div></div>
  </div>
  <div class="col c-ready">
    <div class="col-hd"><div class="col-t">🟢 PRÊTS</div><div class="col-b" id="br">0</div></div>
    <div class="col-grid" id="col-ready"><div class="empty">Rien de prêt</div></div>
  </div>
</div>

</body>
</html>
